name: Release & Publish

on:
  push:
    branches:
      - main

# Garante execução sequencial: se dois pushes chegarem juntos,
# o segundo aguarda o primeiro terminar (não cancela).
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Version, Build & Publish
    runs-on: ubuntu-latest
    # Ignora commits feitos pelo próprio bot (ex: commit "Publish" do Lerna)
    # para evitar loop infinito quando o bot faz push para main.
    if: github.event.head_commit.author.name != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          # registry-url configura NODE_AUTH_TOKEN automaticamente para o npm
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Determina quais pacotes mudaram desde a última tag e bumpa suas versões.
      # --conventional-commits: patch para fix:, minor para feat:, major para BREAKING CHANGE
      # --yes: sem prompt interativo
      # --no-push: não faz push (controlamos o push manualmente abaixo)
      # Saída esperada quando não há mudanças: "No changed packages to version found; exiting."
      # continue-on-error: true permite recuperar de runs anteriores onde a tag
      # já foi criada mas o publish falhou (ex: E429). O from-package no publish
      # é idempotente e não depende do resultado deste passo.
      - name: Version changed packages
        run: yarn lerna version --conventional-commits --yes --no-push
        continue-on-error: true

      # Push feito ANTES do publish para garantir que, se o publish falhar,
      # a versão já está registrada no Git e o próximo run pode fazer from-package novamente.
      # || true: se não há nada novo para fazer push (tags já existem), continua normalmente.
      - name: Push version commits and tags
        run: git push --follow-tags origin main || true

      - name: Build all packages
        run: yarn build

      # Publica pacotes cuja versão em package.json ainda não existe no registry.
      # from-package é resiliente: funciona mesmo quando lerna version não criou
      # novas tags no HEAD (ex: recovery após falha de publish anterior).
      - name: Publish to npm
        run: yarn lerna publish from-package --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
